name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: typecheck + audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: install workspaces (lockfile-reproducible)
        run: npm ci --no-audit --no-fund
      - name: typecheck (all packages)
        run: npm run typecheck
      - name: test (workspaces, if-present)
        run: npm test
      - name: audit (high+)
        run: npm audit --audit-level=high

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v3

  deploy-docs:
    name: Deploy Docs
    runs-on: self-hosted
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: DEPLOY_PATH
          script_stop: true
          command_timeout: 5m
          proxy_timeout: 30s
          debug: false
          script: |
            set -eu
            cd "${DEPLOY_PATH}"
            echo "Deploying Static Site to agents.sera.cx"
            git pull origin main --no-ff
            docker compose -f docker-compose-static.yml up -d --build
            CONTAINER=$(docker ps --filter "name=agent-sera-web" --format "{{.ID}}"
            docker logs --tail=30 "$CONTAINER" || true
            exit 1